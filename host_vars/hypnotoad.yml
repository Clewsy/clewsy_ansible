#  - "alias ll='ls -alFh'"

#common role, packages.yml.  Configure to install/remove packages of various types (apt, snap, classic snap or flatpak).
packages:
  flatpak:
    install:
      - org.mozilla.firefox
  snap:
    remove:
      - firefox

theme_colour: YELLOW
